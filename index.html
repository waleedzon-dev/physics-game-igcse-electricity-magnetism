<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الفيزياء - الكهرباء والمغناطيس (IGCSE)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ لعبة الفيزياء التفاعلية</h1>
            <p>الكهرباء والمغناطيس - منهج IGCSE</p>
        </header>

        <div class="game-area">
            <!-- عنوان الوحدة -->
            <div id="unitTitle" class="unit-title"></div>

            <!-- السؤال -->
            <div id="questionContainer" class="question-container">
                <h2 id="question"></h2>
            </div>

            <!-- الخيارات -->
            <div id="optionsContainer" class="options-container"></div>

            <!-- التصحيح والشرح -->
            <div id="feedbackContainer" class="feedback-container hidden">
                <div id="feedbackMessage"></div>
                <div id="explanation" class="explanation"></div>
                <button id="nextBtn" class="btn btn-next">السؤال التالي →</button>
            </div>

            <!-- شريط التقدم -->
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <p id="progressText" class="progress-text">السؤال 1 من 10</p>

            <!-- النتيجة النهائية -->
            <div id="resultsContainer" class="results-container hidden">
                <h2>مبروك! 🎉</h2>
                <p id="finalScore"></p>
                <button id="restartBtn" class="btn btn-restart">إعادة تشغيل اللعبة</button>
            </div>
        </div>

        <footer>
            <p>تم التطوير لمساعدة طلاب الصف التاسع على فهم الكهرباء والمغناطيس</p>
        </footer>
    </div>

    <script src="questions.js"></script>
    <script src="game.js"></script>
</body>
</html>
